<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai là triệu phú: Bài 53 Mặt Trăng - KHTN 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #020617; 
            color: white; 
            overflow-x: hidden;
            height: 100vh;
        }

        /* Hiệu ứng lửa bùng cháy */
        .fire-bg {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; opacity: 0.4;
        }
        .fire-particle {
            position: absolute; bottom: -50px; background: linear-gradient(to top, #ff4500, #ff8c00, #ffff00);
            width: 15px; height: 15px; border-radius: 50% 50% 20% 50%;
            filter: blur(2px); animation: rise 1.5s infinite ease-out;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(0.2); opacity: 0; }
        }

        .glass-container { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        
        .opt-btn { 
            background: rgba(30, 41, 59, 0.7); border: 2px solid #334155; 
            padding: 12px 20px; border-radius: 12px; transition: 0.2s; cursor: pointer;
            display: flex; align-items: center; width: 100%; margin-bottom: 10px;
        }
        .opt-btn:hover { background: #1e293b; border-color: #fbbf24; }
        .opt-btn.selected { background: #fbbf24 !important; color: #000 !important; font-weight: 900; border-color: #fff; }

        .tf-row { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .tf-btn { padding: 8px 18px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .tf-active-t { background: #10b981; color: white; border-color: white; box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .tf-active-f { background: #ef4444; color: white; border-color: white; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* Scratch Card */
        #scratch-box { position: relative; width: 280px; height: 140px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; border: 4px solid #fbbf24; }
        #scratch-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; }
        
        .scroll-custom::-webkit-scrollbar { width: 6px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="fire-container" class="fire-bg"></div>

    <!-- Âm thanh -->
    <audio id="s-start"><source src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3"></audio>
    <audio id="s-click"><source src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
    <audio id="s-win"><source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="s-lose"><source src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="glass-container p-8 w-full max-w-md shadow-2xl relative z-10 text-center">
        <div class="mb-6">
            <div class="inline-block p-4 bg-yellow-500/20 rounded-full mb-3">
                <svg class="w-12 h-12 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c.132 0 .263 0 .393.007a9 9 0 0 0 9.215 9.215c.007.13.007.261.007.393a9 9 0 1 1-18-0 9 9 0 0 1 8.385-8.993z"/></svg>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">AI LÀ TRIỆU PHÚ</h1>
            <p class="text-yellow-500 font-bold italic">Bài 53: Mặt Trăng</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="in-sbd" placeholder="SỐ BÁO DANH (VD: 001)" class="w-full p-4 rounded-xl bg-slate-900 border-2 border-slate-700 text-center font-bold text-yellow-500 outline-none focus:border-yellow-500">
            <input type="text" id="in-name" placeholder="HỌ VÀ TÊN HỌC SINH" class="w-full p-4 rounded-xl bg-slate-900 border-2 border-slate-700 text-center font-bold text-white uppercase outline-none focus:border-yellow-500">
            <input type="text" id="in-class" placeholder="LỚP (VD: 6A1)" class="w-full p-4 rounded-xl bg-slate-900 border-2 border-slate-700 text-center outline-none focus:border-yellow-500">
            <button onclick="startQuiz()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase text-xl">BẮT ĐẦU THI</button>
        </div>
    </div>

    <!-- MÀN HÌNH CHÍNH -->
    <div id="game-screen" class="hidden w-full max-w-3xl px-4 relative z-10">
        <div class="glass-container p-4 mb-4 flex justify-between items-center border-b-4 border-yellow-500">
            <div class="text-left">
                <div id="u-display" class="text-xs font-bold text-slate-400 uppercase">HỌC SINH: ĐANG TẢI...</div>
                <div class="text-xl font-black text-yellow-500 italic" id="q-progress">CÂU 1/24</div>
            </div>
            <div class="flex gap-2">
                <button onclick="help5050()" id="h-50" class="w-12 h-12 rounded-full border-2 border-yellow-500 flex items-center justify-center font-bold text-xs hover:bg-yellow-500 hover:text-black transition-all">50:50</button>
            </div>
        </div>

        <div class="glass-container p-6 shadow-2xl">
            <div class="max-h-[50vh] overflow-y-auto pr-2 scroll-custom">
                <h2 id="q-text" class="text-xl md:text-2xl font-bold mb-6 text-center leading-tight"></h2>
                
                <div id="mcq-box" class="space-y-2"></div>
                <div id="tf-box" class="hidden space-y-3"></div>
                <div id="short-box" class="hidden flex flex-col items-center py-4">
                    <input type="text" id="short-input" placeholder="NHẬP CÂU TRẢ LỜI..." class="w-full max-w-md p-5 rounded-xl bg-slate-900 border-4 border-yellow-500 text-center text-2xl font-black uppercase text-white outline-none">
                </div>
            </div>
        </div>

        <button onclick="handleConfirm()" class="w-full mt-4 bg-blue-700 hover:bg-blue-600 py-6 rounded-2xl font-black text-2xl shadow-xl transition-all uppercase text-white border-b-4 border-blue-900 active:translate-y-1">ĐÁP ÁN CỦA TÔI</button>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div id="result-screen" class="hidden glass-container p-10 w-full max-w-md text-center border-2 border-yellow-500 relative z-10">
        <h2 class="text-3xl font-black text-yellow-500 mb-2 italic">HOÀN THÀNH BÀI THI</h2>
        <p id="f-desc" class="text-slate-300 mb-8 text-sm"></p>
        <div id="scratch-box">
            <div class="w-full h-full flex flex-col items-center justify-center text-slate-900">
                <span class="text-[10px] font-bold text-slate-400 uppercase">ĐIỂM SỐ CỦA BẠN</span>
                <span id="f-score" class="text-8xl font-black text-blue-900 leading-none">0.0</span>
            </div>
            <canvas id="scratch-canvas" width="280" height="140"></canvas>
        </div>
        <button onclick="location.reload()" class="w-full mt-8 py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold uppercase transition-all">THI LẠI</button>
    </div>

    <!-- MODAL LỜI CHÚC / THÔNG BÁO -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="glass-container p-8 max-w-md w-full text-center border-2 border-yellow-500 shadow-[0_0_50px_rgba(234,179,8,0.3)]">
            <div id="m-icon" class="text-7xl mb-4">🔥</div>
            <h3 id="m-title" class="text-2xl font-black text-white mb-2 uppercase italic"></h3>
            <div id="m-body" class="text-slate-300 mb-8 text-sm leading-relaxed"></div>
            <button id="m-btn" onclick="closeModal()" class="w-full bg-yellow-500 py-5 rounded-xl font-black text-black uppercase shadow-lg hover:bg-yellow-400 transition-all text-xl">TIẾP TỤC</button>
        </div>
    </div>

    <script>
        // DỮ LIỆU CÂU HỎI BÀI 53: MẶT TRĂNG (40 câu)
        const DB_MCQ = [
            {q: "Mặt Trăng là gì của Trái Đất?", a: ["Hành tinh", "Vệ tinh tự nhiên", "Ngôi sao", "Thiên thạch"], c: 1, e: "Mặt Trăng quay quanh Trái Đất nên được gọi là vệ tinh tự nhiên."},
            {q: "Mặt Trăng có tự phát ra ánh sáng không?", a: ["Có", "Không", "Chỉ phát sáng ban đêm", "Chỉ phát sáng ban ngày"], c: 1, e: "Mặt Trăng phản xạ ánh sáng từ Mặt Trời."},
            {q: "Hình dạng Mặt Trăng ta nhìn thấy trên bầu trời thay đổi gọi là gì?", a: ["Các pha của Mặt Trăng", "Các mùa của Mặt Trăng", "Sự quay của Mặt Trăng", "Nhật thực"], c: 0},
            {q: "Tại sao chúng ta thấy các hình dạng khác nhau của Mặt Trăng?", a: ["Do Mặt Trăng tự biến hình", "Do mây che khuất", "Do vị trí Mặt Trăng thay đổi trên quỹ đạo", "Do Trái Đất to lên"], c: 2},
            {q: "Pha Trăng tròn xảy ra khi nào?", a: ["Mặt Trăng nằm giữa Trái Đất và Mặt Trời", "Trái Đất nằm giữa Mặt Trăng và Mặt Trời", "Mặt Trời nằm giữa", "Mặt Trăng đi xa nhất"], c: 1},
            {q: "Thời gian để Mặt Trăng lặp lại một pha (ví dụ Trăng tròn) là khoảng bao lâu?", a: ["24 giờ", "7 ngày", "1 tháng (khoảng 29.5 ngày)", "1 năm"], c: 2},
            {q: "Pha 'Trăng mới' có đặc điểm gì?", a: ["Trăng rất sáng", "Trăng tròn nhất", "Không nhìn thấy Mặt Trăng", "Trăng hình chữ U"], c: 2},
            {q: "Bề mặt Mặt Trăng có đặc điểm gì nổi bật?", a: ["Nhiều đại dương", "Rất nhiều miệng hố (hố va chạm)", "Nhiều rừng cây", "Bằng phẳng như gương"], c: 1},
            {q: "Ánh sáng từ Mặt Trăng có nguồn gốc từ đâu?", a: ["Từ lõi Mặt Trăng", "Phản xạ từ Trái Đất", "Phản xạ từ Mặt Trời", "Từ các ngôi sao khác"], c: 2},
            {q: "Khi ta thấy một nửa Mặt Trăng bên phải sáng, đó là trăng gì?", a: ["Trăng lưỡi liềm đầu tháng", "Trăng bán nguyệt đầu tháng", "Trăng tròn", "Trăng khuyết cuối tháng"], c: 1},
            {q: "Mặt Trăng quay quanh Trái Đất theo chiều nào?", a: ["Đông sang Tây", "Tây sang Đông", "Bắc sang Nam", "Ngẫu nhiên"], c: 1},
            {q: "Phần Mặt Trăng luôn hướng về Trái Đất được gọi là?", a: ["Mặt xa", "Mặt gần", "Mặt tối", "Mặt sáng"], c: 1},
            {q: "Tại sao trên Mặt Trăng có nhiều hố va chạm?", a: ["Do núi lửa phun trào", "Do thiên thạch va chạm và không có khí quyển bảo vệ", "Do người ngoài hành tinh", "Do gió bão"], c: 1},
            {q: "Trọng lực trên Mặt Trăng so với Trái Đất như thế nào?", a: ["Bằng nhau", "Lớn hơn gấp đôi", "Nhỏ hơn (khoảng 1/6)", "Không có trọng lực"], c: 2},
            {q: "Vào ngày rằm âm lịch, ta thường thấy pha trăng nào?", a: ["Trăng mới", "Trăng khuyết", "Trăng tròn", "Trăng lưỡi liềm"], c: 2},
            {q: "Pha 'Trăng khuyết' nằm giữa pha nào và pha nào?", a: ["Trăng mới và Trăng tròn", "Trăng tròn và Trăng mới", "Cả A và B đều đúng", "Không nằm giữa pha nào"], c: 2},
            {q: "Hiện tượng nào xảy ra khi Mặt Trăng đi vào vùng bóng tối của Trái Đất?", a: ["Nhật thực", "Nguyệt thực", "Trăng xanh", "Thủy triều thấp"], c: 1},
            {q: "Con người lần đầu tiên đặt chân lên Mặt Trăng vào năm nào?", a: ["1950", "1969", "1990", "2000"], c: 1},
            {q: "Lực hấp dẫn của Mặt Trăng gây ra hiện tượng gì trên Trái Đất?", a: ["Gió", "Mưa", "Thủy triều", "Động đất"], c: 2},
            {q: "Mặt Trăng mất bao lâu để tự quay quanh trục của nó?", a: ["1 ngày", "27.3 ngày", "365 ngày", "12 giờ"], c: 1}
        ];

        const DB_TF = [
            {q: "Phát biểu về tính chất của Mặt Trăng:", subs: [
                {t: "Mặt Trăng là vệ tinh của Trái Đất.", v: true},
                {t: "Bề mặt Mặt Trăng có khí quyển như Trái Đất.", v: false},
                {t: "Mặt Trăng phản xạ ánh sáng Mặt Trời.", v: true},
                {t: "Mặt Trăng có kích thước lớn hơn Trái Đất.", v: false}
            ]},
            {q: "Về các pha của Mặt Trăng:", subs: [
                {t: "Trăng tròn xuất hiện vào giữa tháng âm lịch.", v: true},
                {t: "Trăng mới là lúc ta thấy trăng sáng nhất.", v: false},
                {t: "Hình dạng Mặt Trăng thay đổi theo chu kỳ.", v: true},
                {t: "Trăng khuyết là do bóng của mây che.", v: false}
            ]},
            {q: "Chuyển động của Mặt Trăng:", subs: [
                {t: "Mặt Trăng quay quanh Trái Đất từ Tây sang Đông.", v: true},
                {t: "Mặt Trăng không tự quay quanh trục của nó.", v: false},
                {t: "Mặt Trăng cũng quay quanh Mặt Trời cùng Trái Đất.", v: true},
                {t: "Mặt Trăng quay quanh Trái Đất mất khoảng 1 tháng.", v: true}
            ]},
            {q: "Đặc điểm bề mặt Mặt Trăng:", subs: [
                {t: "Có nhiều miệng hố do va chạm thiên thạch.", v: true},
                {t: "Có rất nhiều nước lỏng trên bề mặt.", v: false},
                {t: "Nhiệt độ trên Mặt Trăng rất khắc nghiệt.", v: true},
                {t: "Bề mặt Mặt Trăng có nhiều bụi đá.", v: true}
            ]},
            {q: "Trăng và đời sống:", subs: [
                {t: "Lịch âm dựa trên chu kỳ của Mặt Trăng.", v: true},
                {t: "Mặt Trăng giúp ổn định trục nghiêng của Trái Đất.", v: true},
                {t: "Ánh trăng có nhiệt độ rất nóng.", v: false},
                {t: "Thủy triều liên quan đến lực hấp dẫn Mặt Trăng.", v: true}
            ]},
            {q: "Các hiện tượng thiên văn:", subs: [
                {t: "Nguyệt thực xảy ra khi Trái Đất ở giữa Mặt Trời và Mặt Trăng.", v: true},
                {t: "Nhật thực xảy ra khi Mặt Trăng ở giữa Mặt Trời và Trái Đất.", v: true},
                {t: "Mặt Trăng có thể tự phát sáng xanh.", v: false},
                {t: "Trăng máu là một pha bình thường hàng tháng.", v: false}
            ]},
            {q: "Mặt Gần và Mặt Xa:", subs: [
                {t: "Ta luôn thấy cùng một mặt của Mặt Trăng từ Trái Đất.", v: true},
                {t: "Mặt xa của Mặt Trăng luôn luôn tối.", v: false},
                {t: "Chu kỳ tự quay bằng chu kỳ quay quanh Trái Đất.", v: true},
                {t: "Con người chưa bao giờ chụp ảnh được mặt xa.", v: false}
            ]},
            {q: "Về kích thước và khoảng cách:", subs: [
                {t: "Mặt Trăng nhỏ hơn Mặt Trời rất nhiều.", v: true},
                {t: "Mặt Trăng ở gần Trái Đất hơn Mặt Trời.", v: true},
                {t: "Mặt Trăng to bằng Trái Đất.", v: false},
                {t: "Khoảng cách Trái Đất - Mặt Trăng là khoảng 384,400 km.", v: true}
            ]},
            {q: "Lực hấp dẫn trên Mặt Trăng:", subs: [
                {t: "Yếu hơn trên Trái Đất.", v: true},
                {t: "Làm cho người ta nhảy cao hơn.", v: true},
                {t: "Không tồn tại lực hấp dẫn trên Mặt Trăng.", v: false},
                {t: "Giúp giữ chân các phi hành gia trên bề mặt.", v: true}
            ]},
            {q: "Pha trăng khuyết cuối tháng:", subs: [
                {t: "Phần sáng nằm ở phía bên trái (nhìn từ Bắc bán cầu).", v: true},
                {t: "Xảy ra sau pha trăng tròn.", v: true},
                {t: "Xảy ra ngay sau pha trăng mới.", v: false},
                {t: "Hình dạng giống chữ C.", v: true}
            ]}
        ];

        const DB_SHORT = [
            {q: "Mặt Trăng là vệ tinh tự nhiên của hành tinh nào?", a: "TRAI DAT"},
            {q: "Hình dạng của Mặt Trăng thay đổi theo chu kỳ gọi là ... của Mặt Trăng?", a: "PHA"},
            {q: "Khi toàn bộ phần được chiếu sáng hướng về Trái Đất, ta thấy trăng ...?", a: "TRON"},
            {q: "Khi Mặt Trăng nằm giữa Trái Đất và Mặt Trời, ta có pha trăng ...?", a: "MOI"},
            {q: "Ánh sáng từ Mặt Trăng thực chất là ánh sáng của ... phản xạ lại?", a: "MAT TROI"},
            {q: "Chu kỳ thay đổi các pha của Mặt Trăng là khoảng bao nhiêu ngày?", a: "29.5"},
            {q: "Miệng hố trên Mặt Trăng hình thành do va chạm với ...?", a: "THIEN THACH"},
            {q: "Lực nào của Mặt Trăng gây ra thủy triều trên Trái Đất?", a: "HAP DAN"},
            {q: "Tên của phi hành gia đầu tiên đặt chân lên Mặt Trăng là ai?", a: "ARMSTRONG"},
            {q: "Pha trăng có hình dạng lưỡi liềm gọi là trăng ...?", a: "LUOI LIEM"}
        ];

        let quizPool = [];
        let currentIdx = 0;
        let correctCount = 0;
        let selectedIdx = null;
        let tfAns = [null, null, null, null];
        let modalAction = "";

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

        function startQuiz() {
            const name = document.getElementById('in-name').value.trim();
            const sbd = document.getElementById('in-sbd').value.trim();
            const cls = document.getElementById('in-class').value.trim();
            if(!name || !sbd) { alert("Vui lòng nhập đầy đủ SBD và Họ tên!"); return; }

            localStorage.setItem('user_sbd_53', JSON.stringify({sbd, name, cls}));

            // Lấy 16 MCQ, 4 TF, 4 Short = 24 câu
            const mcqs = shuffle([...DB_MCQ]).slice(0, 16);
            const tfs = shuffle([...DB_TF]).slice(0, 4);
            const shorts = shuffle([...DB_SHORT]).slice(0, 4);
            quizPool = shuffle([...mcqs, ...tfs, ...shorts]);

            document.getElementById('u-display').innerText = `Học sinh: ${name} (${sbd}) - Lớp: ${cls}`;
            document.getElementById('login-screen').classList.add('hidden');
            
            document.getElementById('s-start').play();
            createFire('fire-container', 80); 
            
            showModal("CHÚC BẠN THI TỐT!", `Chào <b>${name}</b>, hãy cùng khám phá 24 bí ẩn về Mặt Trăng nhé!`, "🌑", "BẮT ĐẦU NGAY");
            modalAction = "game";
        }

        function renderQuestion() {
            const data = quizPool[currentIdx];
            document.getElementById('q-progress').innerText = `CÂU ${currentIdx + 1}/24`;
            document.getElementById('q-text').innerText = data.q;
            
            const mcqBox = document.getElementById('mcq-box');
            const tfBox = document.getElementById('tf-box');
            const shortBox = document.getElementById('short-box');

            mcqBox.innerHTML = ""; tfBox.innerHTML = "";
            mcqBox.classList.add('hidden'); tfBox.classList.add('hidden'); shortBox.classList.add('hidden');
            selectedIdx = null; tfAns = [null, null, null, null];

            if(data.subs) { // Đúng/Sai
                tfBox.classList.remove('hidden');
                data.subs.forEach((s, i) => {
                    const row = document.createElement('div');
                    row.className = "tf-row flex flex-col md:flex-row justify-between items-center gap-2";
                    row.innerHTML = `<span class="text-sm font-bold flex-1">${i+1}. ${s.t}</span>
                        <div class="flex gap-2">
                            <button id="t-${i}" onclick="setTF(${i}, true)" class="tf-btn bg-slate-800">ĐÚNG</button>
                            <button id="f-${i}" onclick="setTF(${i}, false)" class="tf-btn bg-slate-800">SAI</button>
                        </div>`;
                    tfBox.appendChild(row);
                });
            } else if (data.a && Array.isArray(data.a)) { // MCQ
                mcqBox.classList.remove('hidden');
                data.a.forEach((opt, i) => {
                    const btn = document.createElement('div');
                    btn.className = "opt-btn";
                    btn.id = `opt-${i}`;
                    btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-blue-700 text-white flex items-center justify-center mr-3 font-black text-sm">${String.fromCharCode(65+i)}</span> ${opt}`;
                    btn.onclick = () => { 
                        selectedIdx = i; 
                        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.getElementById('s-click').play();
                    };
                    mcqBox.appendChild(btn);
                });
            } else { // Trả lời ngắn
                shortBox.classList.remove('hidden');
                document.getElementById('short-input').value = "";
                setTimeout(() => document.getElementById('short-input').focus(), 100);
            }
        }

        function setTF(idx, val) {
            tfAns[idx] = val;
            document.getElementById(`t-${idx}`).className = `tf-btn ${val === true ? 'tf-active-t' : 'bg-slate-800'}`;
            document.getElementById(`f-${idx}`).className = `tf-btn ${val === false ? 'tf-active-f' : 'bg-slate-800'}`;
            document.getElementById('s-click').play();
        }

        function handleConfirm() {
            const data = quizPool[currentIdx];
            let isCorrect = false;
            let msg = "";

            if(data.subs) {
                if(tfAns.includes(null)) { alert("Vui lòng hoàn thành tất cả các ý Đúng/Sai!"); return; }
                isCorrect = true;
                data.subs.forEach((s, i) => { if(s.v !== tfAns[i]) isCorrect = false; });
                msg = "Đáp án đúng là: " + data.subs.map(s => s.v ? "Đúng" : "Sai").join(", ");
            } else if (data.a && Array.isArray(data.a)) {
                if(selectedIdx === null) { alert("Vui lòng chọn một đáp án!"); return; }
                isCorrect = (selectedIdx === data.c);
                msg = `Đáp án chính xác là ${String.fromCharCode(65 + data.c)}. ${data.e || ""}`;
            } else {
                const val = document.getElementById('short-input').value.trim().toUpperCase();
                if(!val) { alert("Hãy nhập câu trả lời của bạn!"); return; }
                isCorrect = (val.includes(data.a) || data.a.includes(val));
                msg = `Đáp án chính xác là: ${data.a}`;
            }

            if(isCorrect) {
                correctCount++;
                document.getElementById('s-win').play();
                showModal("CHÍNH XÁC!", "Câu trả lời tuyệt vời. Cùng tiến tới câu tiếp theo!", "🌟", "CÂU TIẾP THEO");
            } else {
                document.getElementById('s-lose').play();
                showModal("CHƯA ĐÚNG", msg, "🌑", "TIẾP TỤC");
            }
            modalAction = "next";
        }

        function showModal(title, body, icon, btnText) {
            document.getElementById('m-title').innerHTML = title;
            document.getElementById('m-body').innerHTML = body;
            document.getElementById('m-icon').innerText = icon;
            document.getElementById('m-btn').innerText = btnText;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            if(modalAction === "game") {
                document.getElementById('game-screen').classList.remove('hidden');
                renderQuestion();
            } else {
                currentIdx++;
                if(currentIdx < 24) renderQuestion();
                else finishGame();
            }
        }

        function help5050() {
            const data = quizPool[currentIdx];
            if(document.getElementById('h-50').disabled || !data.a || !Array.isArray(data.a)) return;
            document.getElementById('h-50').disabled = true;
            document.getElementById('h-50').style.opacity = "0.3";
            let wrong = [0,1,2,3].filter(i => i !== data.c);
            shuffle(wrong).slice(0, 2).forEach(idx => {
                const el = document.getElementById(`opt-${idx}`);
                if(el) el.style.visibility = "hidden";
            });
            document.getElementById('s-click').play();
        }

        function finishGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const score = (correctCount / 24 * 10).toFixed(1);
            document.getElementById('f-score').innerText = score;
            document.getElementById('f-desc').innerText = `Bạn đã trả lời đúng ${correctCount}/24 câu về chủ đề Mặt Trăng.`;
            initScratch();
        }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 14px Roboto"; ctx.fillStyle = "#1e293b"; ctx.textAlign = "center";
            ctx.fillText("CÀO ĐỂ XEM ĐIỂM", 140, 75);
            let drawing = false;
            const draw = (e) => {
                if(!drawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - rect.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
            };
            canvas.onmousedown = () => drawing = true; canvas.onmouseup = () => drawing = false;
            canvas.onmousemove = draw; 
            canvas.ontouchstart = (e) => { drawing = true; draw(e); e.preventDefault(); };
            canvas.ontouchend = () => drawing = false; canvas.ontouchmove = draw;
        }

        function createFire(id, count) {
            const container = document.getElementById(id);
            container.innerHTML = "";
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'fire-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 1.5 + 's';
                p.style.animationDuration = (0.8 + Math.random() * 1) + 's';
                container.appendChild(p);
            }
        }

        window.onload = () => {
            createFire('fire-container', 30);
            const saved = localStorage.getItem('user_sbd_53');
            if(saved) {
                const u = JSON.parse(saved);
                document.getElementById('in-sbd').value = u.sbd || "";
                document.getElementById('in-name').value = u.name || "";
                document.getElementById('in-class').value = u.cls || "";
            }
        };
    </script>
</body>
